<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UHMS</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      color: #0f1f3d;
      background: #f6f9fd;
    }
    main {
      max-width: 720px;
      padding: 40px;
      background: #fff;
      border: 1px solid #dde7f3;
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(15, 31, 61, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }
    p {
      margin: 0;
      color: #66758f;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>UHMS</h1>
    <p>No sample records are bundled in this static build. Connect the FastAPI backend and PostgreSQL database to display hospital, patient, appointment, billing, pharmacy, and laboratory data.</p>
  </main>
</body>
</html>
