<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UHMS Super Admin Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --blue:#1f6feb; --teal:#12a6a6; --green:#12a864; --orange:#f59e0b;
      --red:#ef4444; --ink:#0f1f3d; --muted:#66758f; --line:#dde7f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }
    .shell { display: grid; grid-template-columns: 274px minmax(0, 1fr); min-height: 100vh; }
    .sidebar {
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      border-right: 1px solid #e8eef7; padding: 24px 18px;
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
    }
    .brand { display: flex; gap: 13px; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #edf2f7; margin-bottom: 18px; }
    .logo {
      width: 46px; height: 46px; border-radius: 8px;
      background:
        linear-gradient(135deg, #34c6e8 0 44%, transparent 45%),
        linear-gradient(225deg, #2f80ed 0 44%, transparent 45%),
        linear-gradient(315deg, #36d399 0 44%, transparent 45%),
        linear-gradient(45deg, #6d5dfc 0 44%, transparent 45%);
      box-shadow: 0 12px 22px rgba(31,111,235,.18);
    }
    .brand-title { font-size: 27px; font-weight: 850; line-height: 1; }
    .brand-subtitle { margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.25; font-weight: 650; }
    .nav { display: grid; gap: 4px; }
    .nav button {
      border: 0; background: transparent; text-align: left; cursor: pointer;
      display: flex; align-items: center; gap: 11px; padding: 11px 12px;
      border-radius: 8px; color: #263956; font-size: 14px; font-weight: 750;
    }
    .nav button:hover { background: #eef5ff; color: var(--blue); }
    .nav button.active { color: #fff; background: linear-gradient(135deg, #1f6feb, #2f80ed); box-shadow: 0 10px 18px rgba(31,111,235,.24); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ab0cf; }
    .active .dot { background: #fff; }
    .sidebar-card { margin-top: 16px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: 0 10px 28px rgba(15,31,61,.05); }
    .item-title { font-size: 13px; font-weight: 850; color: var(--ink); }
    .item-detail, .small { margin-top: 4px; font-size: 12px; color: var(--muted); font-weight: 650; }
    .content { min-width: 0; background: linear-gradient(180deg, #fff 0%, #fbfdff 38%, #fff 100%); }
    .topbar {
      display: flex; justify-content: space-between; align-items: end; gap: 20px;
      padding: 24px; border-bottom: 1px solid #edf2f7; background: rgba(255,255,255,.94);
      position: sticky; top: 0; z-index: 3; backdrop-filter: blur(12px);
    }
    h1 { margin: 0; font-size: 26px; line-height: 1.15; }
    h2 { margin: 0; font-size: 17px; line-height: 1.2; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; font-weight: 650; }
    .filters { display: flex; flex-wrap: wrap; align-items: end; gap: 12px; }
    label { display: block; margin-bottom: 6px; color: #344766; font-size: 12px; font-weight: 800; }
    select, input[type=date] {
      width: 180px; height: 42px; border: 1px solid #d8e4f2; border-radius: 8px;
      background: #fff; color: var(--ink); padding: 0 12px; font: inherit; font-size: 13px; font-weight: 700;
    }
    .main { max-width: 1500px; margin: 0 auto; padding: 20px 24px 28px; }
    .context { color: var(--muted); font-size: 13px; font-weight: 650; margin-bottom: 14px; }
    .metric-grid { display: grid; grid-template-columns: repeat(6, minmax(160px, 1fr)); gap: 16px; margin-bottom: 18px; }
    .card, .panel {
      border: 1px solid var(--line); border-radius: 8px; background: #fff;
      box-shadow: 0 12px 30px rgba(15,31,61,.07); overflow: hidden;
    }
    .card { position: relative; min-height: 126px; padding: 17px 16px; }
    .card::after { content:""; position:absolute; inset:0; background:linear-gradient(135deg, var(--accent-bg), transparent 60%); pointer-events:none; }
    .card > * { position: relative; z-index: 1; }
    .metric-title { color: #1e3153; font-size: 13px; font-weight: 800; min-height: 30px; }
    .metric-value { margin-top: 4px; font-size: 29px; font-weight: 850; line-height: 1.05; }
    .metric-foot { margin-top: 12px; color: var(--muted); font-size: 12px; font-weight: 650; }
    .metric-foot strong { color: var(--accent); }
    .grid-3 { display: grid; grid-template-columns: 1.05fr 1.05fr 1.35fr; gap: 16px; margin-bottom: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-bottom: 16px; }
    .panel { padding: 17px; min-height: 100%; }
    .panel.chart::before { content:""; display:block; height: 4px; margin: -17px -17px 13px; background: linear-gradient(90deg, #1f6feb, #12a6a6, #22c55e, #f59e0b); }
    .panel-subtitle { margin: 6px 0 10px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .plot { width: 100%; height: 315px; }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #edf2f7; }
    .row:last-child { border-bottom: 0; }
    .badge { border-radius: 8px; padding: 6px 8px; font-size: 11px; font-weight: 850; min-width: 62px; text-align: center; }
    .Critical { background: #ffe6e6; color: var(--red); }
    .High, .Warning, .Low { background: #fff0db; color: #d97706; }
    .progress { display: grid; grid-template-columns: 92px 1fr 72px; gap: 10px; align-items: center; margin: 15px 0; font-size: 12px; font-weight: 800; }
    .track { height: 8px; border-radius: 8px; background: #e8eef5; overflow: hidden; }
    .fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, #12a864, #11b5a4); }
    .module-hero { display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(300px, .7fr); gap: 16px; margin-bottom: 16px; }
    .module-title { margin: 0; font-size: 28px; font-weight: 850; }
    .module-metrics { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 14px; margin-top: 18px; }
    .module-metric { border: 1px solid #e5edf7; border-radius: 8px; padding: 14px; background: linear-gradient(135deg, rgba(31,111,235,.08), #fff 70%); }
    .architecture-flow { display: grid; gap: 12px; margin-top: 16px; }
    .flow-band { border: 1px solid #dfe8f3; border-radius: 8px; padding: 14px; background: #f7fbff; text-align: center; font-weight: 850; color: #17345f; }
    .flow-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .flow-node { border: 1px solid #e5edf7; border-radius: 8px; padding: 14px; background: #fff; box-shadow: 0 8px 20px rgba(15,31,61,.04); }
    .flow-node strong { display: block; color: #0f1f3d; font-size: 13px; margin-bottom: 5px; }
    .role-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .role-card { border: 1px solid #e5edf7; border-radius: 8px; padding: 15px; background: #fff; }
    .role-card h3 { margin: 0 0 8px; font-size: 15px; }
    .role-card ul { margin: 0; padding-left: 18px; color: #4c5f7a; font-size: 12px; line-height: 1.55; font-weight: 650; }
    table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; font-size: 13px; }
    th { color:#334765; background:#f4f8fd; text-align:left; padding:12px 14px; font-size:12px; font-weight:850; border-bottom:1px solid #dfe8f3; }
    td { padding:13px 14px; border-bottom:1px solid #edf2f7; font-weight:700; color:#253754; }
    tr:last-child td { border-bottom: 0; }
    @media (max-width: 1280px) {
      .metric-grid { grid-template-columns: repeat(3, minmax(180px, 1fr)); }
      .grid-3, .grid-4, .module-hero, .module-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .flow-grid, .role-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 860px) {
      .shell, .metric-grid, .grid-3, .grid-4, .module-hero, .module-metrics { grid-template-columns: 1fr; }
      .flow-grid, .role-grid { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .topbar { position: relative; display: block; }
      .filters { margin-top: 16px; justify-content: flex-start; }
      select, input[type=date] { width: 100%; }
    }
  </style>
</head>

        </section>
        <section class="grid-4">
          <article class="panel chart"><h2>Doctor to Patient Ratio</h2><div class="panel-subtitle">Current ratio: 1:${m.ratio} | Recommended: 1:20</div><div id="ratio" class="plot"></div></article>
          <article class="panel"><h2>Live Alerts</h2><div class="panel-subtitle">${alerts.length} operational alerts</div>${alerts.filter(a => h==="All Hospitals" || a[0]===h).map(a => `<div class="row"><div><div class="item-title">${a[0]}: ${a[1]}</div><div class="item-detail">${a[2]}</div></div><div><div class="badge ${a[3]}">${a[3]}</div><div class="item-detail">${a[4]}</div></div></div>`).join("")}</article>
          <article class="panel"><h2>Staff On Duty</h2><div class="panel-subtitle">Live workforce availability</div>${staff.map(s => `<div class="progress"><div>${s[0]}</div><div class="track"><div class="fill" style="width:${s[1]/s[2]*100}%"></div></div><div>${s[1]} / ${s[2]}</div></div>`).join("")}</article>
          <article class="panel"><h2>Inventory & Resource Alerts</h2><div class="panel-subtitle">Critical and low-stock items</div>${inventory.filter(i => h==="All Hospitals" || i[1]===h || i[1]==="All Hospitals").map(i => `<div class="row"><div><div class="item-title">${i[0]} (${i[1]})</div><div class="item-detail">${i[3]}</div></div><div class="badge ${i[2]}">${i[2]}</div></div>`).join("")}</article>
        </section>
        <section class="grid-4">
          ${["Emergency Queue|46|#ef4444","Ambulance Tracking|24|#1f6feb","Patient Admissions Today|286|#12a864","Discharge Summary Today|142|#6d5dfc"].map(x => { const [t,v,c]=x.split("|"); return `<article class="panel"><h2>${t}</h2><div class="small">Total</div><div class="metric-value" style="color:${c}">${v}</div></article>`; }).join("")}
        </section>`;
      Plotly.newPlot("revHosp", [{type:"bar", x:revenueRows.map(r=>r[0]), y:revenueRows.map(r=>r[1]), text:revenueRows.map(r=>inr(r[1])), textposition:"outside", marker:{color:revenueRows.map(r=>r[1]), colorscale:[[0,"#6d5dfc"],[.5,"#12a6a6"],[1,"#1f6feb"]], line:{color:"#fff", width:2}}}], layout, {displayModeBar:false, responsive:true});
      Plotly.newPlot("dept", [{type:"pie", labels:departments.map(d=>d[0]), values:departments.map(d=>d[1]*scale), hole:.55, textinfo:"percent", marker:{colors:["#1f6feb","#12a6a6","#22c55e","#2f9de0","#6d5dfc","#f6b34b"], line:{color:"#fff", width:2}}}], {...layout, showlegend:true}, {displayModeBar:false, responsive:true});
      Plotly.newPlot("trend", [{type:"scatter", mode:"lines+markers", name:"Revenue (Cr)", x:monthly.map(m=>m[0]), y:monthly.map(m=>m[1]*scale), line:{color:"#0f9f9f", width:3}, fill:"tozeroy", fillcolor:"rgba(18,166,166,.10)"},{type:"scatter", mode:"lines+markers", name:"Expenses (Cr)", x:monthly.map(m=>m[0]), y:monthly.map(m=>m[2]*scale*.96), line:{color:"#ef4444", width:3}, fill:"tozeroy", fillcolor:"rgba(239,68,68,.08)"}], {...layout, legend:{orientation:"h", y:1.14, x:0}}, {displayModeBar:false, responsive:true});
      Plotly.newPlot("ratio", [{type:"indicator", mode:"gauge+number", value:m.ratio, number:{prefix:"1:", font:{size:32,color:"#1f6feb"}}, gauge:{axis:{range:[0,40], tickvals:[0,10,20,30,40], ticktext:["1:0","1:10","1:20","1:30","1:40"]}, bar:{color:"#0f1f3d", thickness:.18}, steps:[{range:[0,20], color:"#14b8a6"},{range:[20,30], color:"#f59e0b"},{range:[30,40], color:"#ef4444"}]}}], {...layout, height:285}, {displayModeBar:false, responsive:true});
    }
    function renderModule() {
      const mod = modules[page];
      document.getElementById("view").innerHTML = `
        <section class="module-hero">
          <article class="panel"><h2 class="module-title">${page}</h2><p class="subtitle">${mod.subtitle}</p><div class="module-metrics">${mod.metrics.map(m => `<div class="module-metric"><div class="small">${m[0]}</div><div class="metric-value" style="color:${mod.accent}">${m[1]}</div></div>`).join("")}</div></article>
          <article class="panel chart"><h2>${mod.chart}</h2><div class="panel-subtitle">Demo view for ${hospitalSelect.value}</div><div id="moduleChart" class="plot"></div></article>
        </section>
        <section class="grid-3" style="grid-template-columns:1.2fr .8fr;">
          <article class="panel"><h2>${page} Worklist</h2><div class="panel-subtitle">Representative records for client walkthrough</div><table><thead><tr>${mod.columns.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${mod.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></article>
          <article class="panel"><h2>Client Demo Talking Points</h2><div class="row"><div><div class="item-title">Unified hospital filter</div><div class="item-detail">Owners can switch between all hospitals or a single hospital without changing modules.</div></div></div><div class="row"><div><div class="item-title">Operational drill-down</div><div class="item-detail">Each module can later connect to real approvals, reports and audit logs.</div></div></div><div class="row"><div><div class="item-title">Static demo data today</div><div class="item-detail">This Netlify build is ready for API integration later.</div></div></div></article>
        </section>`;
      Plotly.newPlot("moduleChart", [{type:"bar", x:mod.categories, y:mod.values, text:mod.values, textposition:"outside", marker:{color:mod.values, colorscale:[[0,"#dbeafe"],[.45,mod.accent],[1,"#0f1f3d"]], line:{color:"#fff", width:2}}}], layout, {displayModeBar:false, responsive:true});
    }
    function renderArchitecture() {
      document.getElementById("view").innerHTML = `
        <section class="module-hero">
          <article class="panel">
            <h2 class="module-title">Integrated Hospital Management System Architecture</h2>
            <p class="subtitle">One centralized digital platform for the owner to monitor operations, revenue, patients, doctors, departments, diagnostics, billing, pharmacy and patient engagement across all 3 hospitals.</p>
            <div class="module-metrics">
              <div class="module-metric"><div class="small">Hospitals</div><div class="metric-value" style="color:#1f6feb">3</div></div>
              <div class="module-metric"><div class="small">Core Roles</div><div class="metric-value" style="color:#12a864">6</div></div>
              <div class="module-metric"><div class="small">Business Modules</div><div class="metric-value" style="color:#f59e0b">8+</div></div>
              <div class="module-metric"><div class="small">Platform Goal</div><div class="metric-value" style="color:#6d5dfc">Unified</div></div>
            </div>
          </article>
          <article class="panel chart">
            <h2>Pitch Statement</h2>
            <div class="panel-subtitle">Client discussion summary</div>
            <p class="subtitle">This platform helps the hospital owner manage all 3 hospitals from one dashboard. It improves financial visibility, department control, doctor productivity, patient experience and operational efficiency.</p>
            <p class="subtitle">The patient mobile app reduces phone calls, improves appointment management, delivers reports digitally and increases patient satisfaction.</p>
          </article>
        </section>

        <section class="grid-3" style="grid-template-columns:1.2fr .8fr;">
          <article class="panel">
            <h2>High-Level System Flow</h2>
            <div class="panel-subtitle">Owner dashboard to hospital branches to central HMS platform</div>
            <div class="architecture-flow">
              <div class="flow-band">Owner / Super Admin Dashboard</div>
              <div class="flow-grid">
                <div class="flow-node"><strong>Hospital A</strong><span class="small">Admin portal, departments, OPD/IPD/ER, billing, pharmacy, pathology and radiology</span></div>
                <div class="flow-node"><strong>Hospital B</strong><span class="small">Branch operations with hospital-wise tagging and group-level visibility</span></div>
                <div class="flow-node"><strong>Hospital C</strong><span class="small">Diagnostics, staff, inventory, claims and patient engagement workflows</span></div>
              </div>
              <div class="flow-band">Central HMS Platform</div>
              <div class="flow-grid">
                <div class="flow-node"><strong>Web Portals</strong><span class="small">Super admin, hospital admin, doctor and staff portals</span></div>
                <div class="flow-node"><strong>Patient Mobile App</strong><span class="small">Appointments, reports, prescriptions, payments and reminders</span></div>
                <div class="flow-node"><strong>Central Database</strong><span class="small">Patient, billing, reports and appointment data</span></div>
              </div>
            </div>
          </article>
          <article class="panel">
            <h2>Recommended Technology</h2>
            <div class="row"><div><div class="item-title">Frontend</div><div class="item-detail">React or Angular for web dashboards. Flutter or React Native for mobile.</div></div></div>
            <div class="row"><div><div class="item-title">Backend</div><div class="item-detail">API-based architecture with RBAC, secure patient data and multi-hospital separation.</div></div></div>
            <div class="row"><div><div class="item-title">Database</div><div class="item-detail">Central PostgreSQL, MySQL or MS SQL Server with hospital-wise tagging.</div></div></div>
            <div class="row"><div><div class="item-title">Cloud</div><div class="item-detail">AWS, Azure or Google Cloud with storage, notifications, backup and monitoring.</div></div></div>
          </article>
        </section>

        <section class="panel">
          <h2>User Roles & Demo Talking Points</h2>
          <div class="panel-subtitle">Role-based access for owner, hospital teams, clinicians, diagnostics and patients</div>
          <div class="role-grid">
            <div class="role-card"><h3>Super Admin / Owner</h3><ul><li>Total revenue and hospital comparison</li><li>Department and doctor performance</li><li>Claims, collections and occupancy</li></ul></div>
            <div class="role-card"><h3>Hospital Admin</h3><ul><li>Department and staff management</li><li>OPD/IPD workflow</li><li>Billing and daily operations reports</li></ul></div>
            <div class="role-card"><h3>Doctors</h3><ul><li>Appointment list and patient queue</li><li>EMR, prescription and clinical notes</li><li>Lab/radiology requests and follow-ups</li></ul></div>
            <div class="role-card"><h3>Nurses / Staff</h3><ul><li>Vitals and medication administration</li><li>Ward tasks and patient movement</li><li>Nursing notes and role-based access</li></ul></div>
            <div class="role-card"><h3>Pathology / Radiology</h3><ul><li>Orders, samples/images and status</li><li>Report upload and doctor review</li><li>Patient notification after approval</li></ul></div>
            <div class="role-card"><h3>Patient Mobile App</h3><ul><li>Appointments and QR check-in</li><li>Reports, prescriptions and payment</li><li>Medicine reminders and health wallet</li></ul></div>
          </div>
        </section>`;
    }
    function render() {
      document.querySelectorAll(".nav button").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
      const h = hospitalSelect.value;
      document.getElementById("pageTitle").textContent = page === "Dashboard" ? "Super Admin Dashboard" : page === "Architecture" ? "Architecture" : `${page} Module`;
      document.getElementById("pageSubtitle").textContent = page === "Dashboard" ? "Owner-level operational overview across Hospital A, Hospital B, and Hospital C" : page === "Architecture" ? "Centralized HMS architecture for the client pitch" : modules[page].subtitle;
      document.getElementById("context").textContent = `Viewing ${h} from ${document.getElementById("start").value} to ${document.getElementById("end").value}`;
      if (page === "Dashboard") renderDashboard(); else if (page === "Architecture") renderArchitecture(); else renderModule();
    }
    render();
  </script>
</body>
</html>
